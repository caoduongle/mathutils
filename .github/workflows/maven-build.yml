name: Java CI with Maven

# Kích hoạt (trigger) workflow khi có lệnh push hoặc tạo pull request vào nhánh main/master
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest # Chạy trên máy ảo Ubuntu mới nhất của GitHub

    steps:
      # Bước 1: Kéo (checkout) mã nguồn từ repository về máy ảo
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      # Bước 2: Cài đặt môi trường Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Tự động cache các thư viện Maven để lần chạy sau nhanh hơn

      # Bước 3: Chạy vòng đời Maven (Biên dịch, Chạy Unit Test và Đóng gói)
      - name: Build with Maven (Test & Package)
        run: mvn clean package

      # Bước 4: Lưu trữ file .jar (Artifact) sau khi build thành công
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mathutils-compiled-jar
          # Đường dẫn tìm tệp .jar do Maven tạo ra trong thư mục target
          path: target/*.jar